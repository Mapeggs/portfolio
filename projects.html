      <h3>CubCrawl — HackDavis 2026</h3>
      <p>
        CubCrawl is a campus-focused social thread platform built for HackDavis 2026. The project helps students discover clubs, follow updates, view events, and explore campus communities through a cleaner feed-style experience made for university life.
      </p>
      <p>
        My contribution focused on the visual direction and front-end experience, including mobile app mockups in Figma and a responsive website built with HTML, CSS, and JavaScript. The concept uses .edu emails to connect students to their school, then organizes club posts through For You, Following, Explore, Alerts, and Profile sections.
      </p>

      <div class="hack-project-meta" aria-label="CubCrawl project highlights">

      <div class="modal__media">

      <p>
        The Lone Stick is a linear, combat-heavy platformer where you play as Branch, a stick figure fighting through a stylized island ruled by two warlords. After Branch's adoptive father is killed by his brother and followers, Branch takes up his sword to get revenge on everyone standing in his way.
      </p>
      <p>
        The game focuses on handcrafted levels, enemies, and bosses while letting players dash, jump, attack, platform, collect gold from defeated enemies, and use shops to upgrade their character.
      </p>

    <template id="detail-dodgeball">
        <h3>DodgeBall</h3>
        <div class="modal__media">
            <img class="modal__image" src="assets/png/Dodgeball.png" alt="DodgeBall thumbnail" />
        </div>
        <p>
          A local multiplayer game built with JavaScript and Phaser 3, where two players compete on the same keyboard. Each player controls either Player 1 or Player 2, aiming to hit their
          opponent with dodgeballs. The first to reach 3 points wins. Developed using free assets from itch.io, the game emphasizes fast-paced gameplay and simple, engaging mechanics.
        </p>
        <div class="btn-row">
        <a class="btn" href="https://github.com/Mapeggs/DodgeBall" target="_blank" rel="noopener">View on GitHub</a>

    <template id="detail-house">
        <h3>House Tour Trailer</h3>
        <div class="modal__media">
          <img class="modal__image" src="assets/png/housetour.png" alt="House Tour Trailer frame"/>
        </div>
        <p>A cinematic house tour experience created in Unity, designed to simulate a dynamic walkthrough. Using camera configurations and timeline managers, I implemented scripted 
          contraptions that trigger at specific times, showcasing visual effects such as fire and a rigged door animation. By combining Unity’s particle systems, timeline events, and 
          free assets from the Unity Store, I crafted an immersive, game-like trailer experience.
        </p>
        <div class="btn-row">
          <a class="btn" href="https://drive.google.com/file/d/11cBgsTozPZuNvnZT2dx_ki56UuUq0NYd/view?usp=drive_link" target="_blank" rel="noopener">View on Google Drive</a>

    <template id="detail-robot">
      <h3>Robot Sorting</h3>
      <div class="modal__media">
        <video class="modal__video" src="assets/mp4/robotsortingvid.mp4" controls playsinline style="width:100%; max-height:70vh; border-radius:12px;"></video>
      </div>
      <p>
        A large portion of the visual style combines AI-generated artwork, my own hand-crafted assets, and additional resources imported from itch.io. The project was built in LÖVE2D under a 
        unique set of design constraints: the player cannot directly control a character, there is no dialogue, the entire experience takes place inside a machine, and the narrative must 
        incorporate a theme of betrayal. These limitations pushed me to experiment with environmental storytelling, reactive systems, and mechanical tension to create a more atmospheric and 
        expressive gameplay experience.
      </p>
      <div class="btn-row">
        <a class="btn" href="#" target="_blank" rel="noopener">See More</a>

          Built and rigged the full 3D model in Blender and animated a dynamic crawling cycle. Demonstrated strong iterative design skills by refining topology, materials, 
          and movement to achieve a more polished, game-ready character. 
        </p>

    Created an 8 bit retro-style audio swap for a game scene using Reaper. The project involved extracting the original audio &amp; video from the game Stealth by Richard E. Sansom &amp; Tracy Lagrone and replacing it

  </p>
